name: Build Dragonic Decoder APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
  release:
    types: [created]

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout source code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🐘 Grant Gradle execute permission
        run: chmod +x gradlew

      - name: 🔧 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 🚀 Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: 📦 Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DragonicDecoder-Debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 📦 Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DragonicDecoder-Release-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: 🏷️ Get version name
        id: get_version
        run: |
          VERSION=$(grep versionName app/build.gradle | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: ⬇️ Checkout source code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🐘 Grant Gradle execute permission
        run: chmod +x gradlew

      - name: 🏗️ Build Release APK
        run: ./gradlew assembleRelease

      - name: 🏷️ Get version info
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle | awk '{print $2}' | tr -d '"')
          BUILD=$(grep versionCode app/build.gradle | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: 🎯 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: "Dragonic Decoder v${{ steps.version.outputs.version }}"
          body: |
            ## 🐉 Dragonic Decoder v${{ steps.version.outputs.version }}

            ### What's New
            - Cyberpunk neon UI with glowing borders
            - Universal decoder: Base64, Base32, Base16, Hex, URL, JWT, Unicode, HTML Entity, Binary, Octal, ROT13
            - Auto encoding detection
            - File analyzer with entropy detection
            - Decode history with statistics
            - Export and share decoded results

            ### Installation
            1. Download `DragonicDecoder-v${{ steps.version.outputs.version }}.apk`
            2. Enable "Install unknown apps" on your Android device
            3. Install the APK

            ### Requirements
            - Android 8.0 (API 26) or higher
            - No internet required — 100% offline

            ---
            Built from commit: ${{ github.sha }}
          files: |
            app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🐘 Grant Gradle execute permission
        run: chmod +x gradlew

      - name: 🧪 Run Unit Tests
        run: ./gradlew test

      - name: 📊 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test-Results-${{ github.run_number }}
          path: app/build/reports/tests/
          retention-days: 14
