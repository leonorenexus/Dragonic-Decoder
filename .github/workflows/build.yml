name: Build Dragonic Decoder APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout source code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📥 Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar

      - name: 🐘 Grant Gradle execute permission
        run: chmod +x gradlew

      - name: 🔧 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 🚀 Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: 📦 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DragonicDecoder-Debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 📦 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: DragonicDecoder-Release-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90
